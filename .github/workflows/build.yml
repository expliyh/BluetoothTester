name: Build

on:
  push:
  pull_request:
  workflow_call:

jobs:
  test:
    uses: ./.github/workflows/unit-test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: "25"
      ANDROID_SDK_VERSION: "36"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_SDK_VERSION }}
          components: build-tools-36.0.0

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK & AAB
        run: ./gradlew assembleDebug bundleDebug --stacktrace -PenableAbiSplits=true

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/debug/*.aab

      - name: Decode keystore
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /home/runner/work/keystore.jks
          echo "ANDROID_KEYSTORE_PATH=/home/runner/work/keystore.jks" >> $GITHUB_ENV
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build release APK & AAB
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: ./gradlew assembleRelease bundleRelease --stacktrace -PenableAbiSplits=true
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_ALIAS_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}

      - name: Upload release artifacts
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
